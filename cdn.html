<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国象棋 - 在线对战</title>

    <!-- 通过 jsDelivr CDN 加载样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/llpeace/play-lemon@main/style.css">
</head>
<body>
    <div class="game-container">
        <!-- 黑方信息 -->
        <div class="player-info black-player">
            <div class="player-avatar">黑</div>
            <div class="player-details">
                <span class="player-name">黑方</span>
                <span class="player-status" id="black-status">等待中</span>
            </div>
        </div>

        <!-- 棋盘区域 -->
        <div class="board-container">
            <canvas id="chessBoard"></canvas>
        </div>

        <!-- 红方信息 -->
        <div class="player-info red-player">
            <div class="player-avatar">红</div>
            <div class="player-details">
                <span class="player-name">红方</span>
                <span class="player-status" id="red-status">走棋中</span>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="control-buttons">
            <button id="undoBtn" class="btn btn-secondary">悔棋</button>
            <button id="hintBtn" class="btn btn-primary">提示</button>
            <button id="restartBtn" class="btn btn-danger">重开</button>
            <button id="onlineBtn" class="btn btn-primary" onclick="showOnlineModal()">在线对战</button>
        </div>

        <!-- 在线状态显示 -->
        <div class="online-status-bar" id="onlineStatusBar" style="display: none;">
            <span id="onlineStatus">离线</span>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-section">
            <div class="chat-header" id="chatToggle">
                <span>聊天</span>
                <span class="chat-toggle-icon">▼</span>
            </div>
            <div class="chat-content" id="chatContent">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="emoji-bar">
                    <button class="emoji-btn" data-emoji="👍">👍</button>
                    <button class="emoji-btn" data-emoji="👎">👎</button>
                    <button class="emoji-btn" data-emoji="😄">😄</button>
                    <button class="emoji-btn" data-emoji="😢">😢</button>
                    <button class="emoji-btn" data-emoji="🤔">🤔</button>
                    <button class="emoji-btn" data-emoji="😱">😱</button>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="输入消息..." maxlength="50">
                    <button id="sendBtn" class="btn btn-small">发送</button>
                </div>
            </div>
        </div>

        <!-- 观战模式 -->
        <div class="spectator-section" id="spectatorSection">
            <div class="spectator-header">
                <span>观战者 (<span id="spectatorCount">0</span>)</span>
            </div>
            <div class="spectator-list" id="spectatorList"></div>
        </div>

        <!-- 游戏结束弹窗 -->
        <div class="modal" id="gameOverModal">
            <div class="modal-content">
                <h2 id="gameOverTitle">游戏结束</h2>
                <p id="gameOverMessage"></p>
                <button id="playAgainBtn" class="btn btn-primary">再来一局</button>
            </div>
        </div>

        <!-- 在线对战弹窗 -->
        <div class="modal" id="onlineModal">
            <div class="modal-content">
                <div class="modal-body">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>
    </div>

    <!-- PeerJS 库 -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <!-- 通过 jsDelivr CDN 加载脚本 -->
    <script src="https://cdn.jsdelivr.net/gh/llpeace/play-lemon@main/pieces.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/llpeace/play-lemon@main/game.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/llpeace/play-lemon@main/chat.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/llpeace/play-lemon@main/online.js"></script>
</body>
</html>
